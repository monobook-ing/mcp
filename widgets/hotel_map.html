    async function tryFullscreenApi() {
      const root = document.documentElement;
      if (!root) return false;

      if (document.fullscreenElement || document.webkitFullscreenElement) {
        STATE.fullscreenApiActive = true;
        return true;
      }

      const requestFullscreen = root.requestFullscreen || root.webkitRequestFullscreen;
      if (typeof requestFullscreen !== 'function') return false;

      try {
        await Promise.resolve(requestFullscreen.call(root));
        STATE.fullscreenApiActive = true;
        return true;
      } catch (_) {
        STATE.fullscreenApiActive = false;
        return false;
      }
    }

    function exitBrowserFullscreenIfNeeded() {
      if (!STATE.fullscreenApiActive) return;
      const exitFullscreen = document.exitFullscreen || document.webkitExitFullscreen;
      if (typeof exitFullscreen !== 'function') {
        STATE.fullscreenApiActive = false;
        return;
      }

      const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;
      if (!fullscreenElement) {
        STATE.fullscreenApiActive = false;
        return;
      }

      STATE.fullscreenApiActive = false;
      Promise.resolve(exitFullscreen.call(document)).catch(() => {
      });
    }

    function toggleBottomSheet() {
      if (!STATE.fullscreenOverlay || STATE.fullscreenSource !== 'constrained') return;
      const sidebar = STATE.fullscreenOverlay.querySelector('.fullscreen-sidebar');
      if (!sidebar) return;
      if (window.matchMedia && window.matchMedia('(max-width: 760px)').matches) {
        STATE.bottomSheetCollapsed = false;
        sidebar.classList.remove('collapsed');
        return;
      }

      STATE.bottomSheetCollapsed = !STATE.bottomSheetCollapsed;
      sidebar.classList.toggle('collapsed', STATE.bottomSheetCollapsed);
    }

    function activateFullscreenOverlay(overlay, source) {
      const fullscreenIntent = consumeFullscreenIntent();
      STATE.fullscreenOverlay = overlay;
      STATE.mode = 'fullscreen';
      STATE.fullscreenSource = source;
      STATE.bottomSheetCollapsed = false;
      STATE.fullscreenSidebarView = 'cards';
      clearParentCollapseFallback();
      if (source === 'host' || source === 'parent') {
        resetFullscreenViewportBounds();
        updateFullscreenViewportBounds();
        startFullscreenDisplayModePoll();
      }
      startFullscreenEnterAnimation(overlay);

      if (source === 'constrained') {
        const bottomSheetHandle = overlay.querySelector('#bottomSheetHandle');
        if (bottomSheetHandle) bottomSheetHandle.addEventListener('click', toggleBottomSheet);
      }

      renderFullscreenCards();

      const fullscreenMapSlot = overlay.querySelector('#fullscreenMapSlot');
      moveMapCanvas(fullscreenMapSlot);
      triggerMapResize();
      triggerMapResize(getFullscreenResizeSettleDelayMs());

      if (fullscreenIntent.clearSelection) {
        STATE.selectedPropertyId = '';
        updateCardStates();
        updatePinStates();
        closeDetailPanel();
      } else if (fullscreenIntent.propertyId) {
        selectProperty(
          fullscreenIntent.propertyId,
          'card',
          fullscreenIntent.openDetail ? 'fullscreen' : 'inline'
        );
        if (!fullscreenIntent.openDetail) {
          closeDetailPanel();
        }
      } else {
        const defaultPropertyId = resolveDefaultFullscreenPropertyId();
        if (defaultPropertyId) {
          selectProperty(defaultPropertyId, 'card', 'fullscreen');
        } else {
          STATE.selectedPropertyId = '';
          updateCardStates();
          updatePinStates();
          closeDetailPanel();
        }
      }

      if (fullscreenIntent.propertyId) {
        scrollCardIntoView(fullscreenIntent.propertyId);
      } else if (STATE.selectedPropertyId) {
        scrollCardIntoView(STATE.selectedPropertyId);
      }

      if (source === 'host' || source === 'parent') {
        requestAnimationFrame(() => {
          updateFullscreenViewportBounds();
        });
        setTimeout(() => {
          updateFullscreenViewportBounds();
        }, 200);
      }

      sendHeight(getFullscreenViewportHeight());
    }

    function openFullscreenParentMode() {
      if (STATE.fullscreenSource === 'parent' && STATE.fullscreenOverlay) return;
      if (STATE.fullscreenSource === 'host' && STATE.fullscreenOverlay) return;

      if (STATE.fullscreenSource === 'iframe' && STATE.fullscreenOverlay) {
        closeFullscreenIframeFallback();
      }
      if (STATE.fullscreenSource === 'constrained' && STATE.fullscreenOverlay) {
        closeFullscreenConstrainedMode();
      }

      const overlay = buildFullscreenOverlayElement('fullscreen-overlay fullscreen-overlay-embedded');
      setInlineShellHidden(true);
      document.body.appendChild(overlay);
      activateFullscreenOverlay(overlay, 'parent');
    }

    function openFullscreenHostMode() {
      if (STATE.fullscreenSource === 'host' && STATE.fullscreenOverlay) return;
      if (STATE.mode === 'fullscreen') return;

      const overlay = buildFullscreenOverlayElement('fullscreen-overlay fullscreen-overlay-embedded');
      setInlineShellHidden(true);
      document.body.appendChild(overlay);
      activateFullscreenOverlay(overlay, 'host');
    }

    function openFullscreenIframeFallback() {
      if (STATE.fullscreenOverlay) return;
      const overlay = buildFullscreenOverlayElement('fullscreen-overlay');
      document.body.appendChild(overlay);
      activateFullscreenOverlay(overlay, 'iframe');
    }

    function openFullscreenConstrainedMode() {
      if (STATE.fullscreenOverlay) return;
      sendHeight(Math.max(window.innerHeight, window.screen?.height || 0));
      const overlay = buildConstrainedOverlayElement();
      document.body.appendChild(overlay);
      activateFullscreenOverlay(overlay, 'constrained');
    }

    function requestParentExpand() {
      const requestId = createOverlayRequestId('expand');
      STATE.overlayAction = 'expand';
      STATE.overlayRequestId = requestId;
      clearParentExpandAckTimeout();
      postOverlayMessage('widget:expand', requestId);

      STATE.parentExpandAckTimeoutId = setTimeout(async () => {
        if (STATE.overlayAction !== 'expand') return;
        if (STATE.overlayRequestId !== requestId) return;

        clearOverlayRequestState();
        if (STATE.mode === 'fullscreen') return;
        const fullscreenApiWorked = await tryFullscreenApi();
        if (STATE.mode === 'fullscreen') return;
        if (fullscreenApiWorked) {
          openFullscreenIframeFallback();
          return;
        }
        openFullscreenConstrainedMode();
      }, PARENT_EXPAND_ACK_TIMEOUT_MS);
    }

    async function openFullscreen(intent) {
      if (STATE.mode === 'fullscreen') return;
      const normalizedIntent = normalizeFullscreenIntent(intent);
      STATE.fullscreenIntent = normalizedIntent;
      rememberInlineSelectionForFullscreen(normalizedIntent);
      const hostFullscreenWorked = await requestHostDisplayMode('fullscreen');
      if (hostFullscreenWorked) {
        openFullscreenHostMode();
        return;
      }
      requestParentExpand();
    }

    function closeFullscreenParentMode() {
      if (STATE.fullscreenSource !== 'parent' || !STATE.fullscreenOverlay) return;
      exitBrowserFullscreenIfNeeded();
      clearParentCollapseFallback();
      unbindFullscreenCardSwipeHandling();
      stopFullscreenDisplayModePoll();
      clearOverlayRequestState();

      closeDetailPanel();

      const inlineMapShell = document.getElementById('inlineMapShell');
      const mapStatus = document.getElementById('mapStatus');
      moveMapCanvas(inlineMapShell, mapStatus);

      STATE.fullscreenOverlay.remove();
      STATE.fullscreenOverlay = null;
      STATE.mode = 'inline';
      STATE.fullscreenSource = 'none';
      STATE.fullscreenSidebarView = 'cards';
      resetFullscreenViewportBounds();
      setInlineShellHidden(false);
      restoreInlineSelectionAfterFullscreenClose();
      emitFullscreenHeaderContext(resolveFullscreenAccountContext(), false);

      triggerMapResize();
      sendHeight();
    }

    function closeFullscreenIframeFallback() {
      if (STATE.fullscreenSource !== 'iframe' || !STATE.fullscreenOverlay) return;
      exitBrowserFullscreenIfNeeded();
      clearParentCollapseFallback();
      unbindFullscreenCardSwipeHandling();
      stopFullscreenDisplayModePoll();
      clearOverlayRequestState();

      closeDetailPanel();

      const inlineMapShell = document.getElementById('inlineMapShell');
      const mapStatus = document.getElementById('mapStatus');
      moveMapCanvas(inlineMapShell, mapStatus);

      STATE.fullscreenOverlay.remove();
      STATE.fullscreenOverlay = null;
      STATE.mode = 'inline';

      resetFullscreenViewportBounds();
      setInlineShellHidden(false);
      restoreInlineSelectionAfterFullscreenClose();
      emitFullscreenHeaderContext(resolveFullscreenAccountContext(), false);

      triggerMapResize();
      sendHeight();
    }

    function closeFullscreenConstrainedMode() {
      if (STATE.fullscreenSource !== 'constrained' || !STATE.fullscreenOverlay) return;
      exitBrowserFullscreenIfNeeded();
      clearParentCollapseFallback();
      unbindFullscreenCardSwipeHandling();
      stopFullscreenDisplayModePoll();
      clearOverlayRequestState();

      closeDetailPanel();

      const inlineMapShell = document.getElementById('inlineMapShell');
      const mapStatus = document.getElementById('mapStatus');
      moveMapCanvas(inlineMapShell, mapStatus);

      STATE.fullscreenOverlay.remove();
      STATE.fullscreenOverlay = null;
      STATE.mode = 'inline';
      STATE.fullscreenSource = 'none';
      STATE.bottomSheetCollapsed = false;
      STATE.fullscreenSidebarView = 'cards';
      resetFullscreenViewportBounds();
      setInlineShellHidden(false);
      restoreInlineSelectionAfterFullscreenClose();
      emitFullscreenHeaderContext(resolveFullscreenAccountContext(), false);

      triggerMapResize();
      sendHeight();
    }

    function closeFullscreenHostMode() {
      if (STATE.fullscreenSource !== 'host' || !STATE.fullscreenOverlay) return;
      exitBrowserFullscreenIfNeeded();
      clearParentCollapseFallback();
      unbindFullscreenCardSwipeHandling();
      stopFullscreenDisplayModePoll();
      clearOverlayRequestState();

      closeDetailPanel();

      const inlineMapShell = document.getElementById('inlineMapShell');
      const mapStatus = document.getElementById('mapStatus');
      moveMapCanvas(inlineMapShell, mapStatus);

      STATE.fullscreenOverlay.remove();
      STATE.fullscreenOverlay = null;
      STATE.mode = 'inline';
      STATE.fullscreenSource = 'none';
      STATE.fullscreenSidebarView = 'cards';
      resetFullscreenViewportBounds();
      setInlineShellHidden(false);
      restoreInlineSelectionAfterFullscreenClose();
      emitFullscreenHeaderContext(resolveFullscreenAccountContext(), false);

      triggerMapResize();
      sendHeight();
    }

    function requestParentCollapse() {
      const requestId = createOverlayRequestId('collapse');
      STATE.overlayAction = 'collapse';
      STATE.overlayRequestId = requestId;
      clearParentCollapseFallback();
      postOverlayMessage('widget:collapse', requestId);
      STATE.parentCollapseFallbackId = setTimeout(() => {
        if (STATE.fullscreenSource === 'parent' && STATE.fullscreenOverlay) {
          closeFullscreenParentMode();
        }
      }, PARENT_COLLAPSE_FALLBACK_MS);
    }

    function closeFullscreen() {
      if (STATE.mode !== 'fullscreen') return;
      exitBrowserFullscreenIfNeeded();
      if (STATE.fullscreenSource === 'parent') {
        requestParentCollapse();
        return;
      }
      if (STATE.fullscreenSource === 'host') {
        void requestHostDisplayMode('inline');
        closeFullscreenHostMode();
        return;
      }
      if (STATE.fullscreenSource === 'constrained') {
        closeFullscreenConstrainedMode();
        return;
      }
      closeFullscreenIframeFallback();
    }

    function handleOverlayStateMessage(message) {
      if (!message || typeof message !== 'object') return;
      if (message.type !== 'widget:overlay-state') return;
      if (message.widget !== FULLSCREEN_WIDGET_NAME) return;

      const expanded = message.expanded === true ? true : (message.expanded === false ? false : null);
      if (expanded === null) return;

      const requestId = typeof message.requestId === 'string' ? message.requestId : '';
      if (STATE.overlayRequestId && requestId && requestId !== STATE.overlayRequestId && expanded) {
        return;
      }

      if (expanded) {
        clearOverlayRequestState();
        openFullscreenParentMode();
        return;
      }

      clearOverlayRequestState();
      if (STATE.fullscreenSource === 'host') {
        closeFullscreenHostMode();
        return;
      }
      if (STATE.fullscreenSource === 'parent') {
        closeFullscreenParentMode();
        return;
      }
      if (STATE.fullscreenSource === 'constrained') {
        closeFullscreenConstrainedMode();
        return;
      }
      closeFullscreenIframeFallback();
    }

    function applyPayload(payload) {
      STATE.properties = Array.isArray(payload.properties) ? payload.properties : [];
      STATE.propertyById = new Map(STATE.properties.map((property) => [String(property.id), property]));
      STATE.checkIn = String(payload.check_in || '');
      STATE.checkOut = String(payload.check_out || '');
      STATE.queryContext = payload.query_context && typeof payload.query_context === 'object' ? payload.query_context : {};
      STATE.mapsApiKey = String(payload.maps_api_key || EMBEDDED_MAPS_API_KEY || '');

      renderShell();
      setInlineShellHidden(STATE.mode === 'fullscreen' && (STATE.fullscreenSource === 'parent' || STATE.fullscreenSource === 'host'));
      renderInlineCards();

      ensureMapReady()
        .then(() => {
          createMarkers();
          const preserveMobileFullscreenMapOnlyState = (
            STATE.mode === 'fullscreen'
            && isMobileViewport()
            && !STATE.selectedPropertyId
            && !STATE.detailPropertyId
          );
          if (!STATE.selectedPropertyId && STATE.properties.length && !preserveMobileFullscreenMapOnlyState) {
            STATE.selectedPropertyId = String(STATE.properties[0].id || '');
          }
          updateCardStates();
          updatePinStates();
        })
        .catch(() => {
        })
        .finally(() => {
          setTimeout(sendHeight, 30);
        });

      if (STATE.fullscreenOverlay) {
        renderFullscreenCards();
      } else {
        emitFullscreenHeaderContext(resolveFullscreenAccountContext());
      }
    }

    function isStructuredMapPayload(data) {
      return !!data && typeof data === 'object' && Array.isArray(data.properties);
    }

    function normalizeToolPayload(raw) {
      const sources = [];

      if (raw && typeof raw === 'object') {
        sources.push(raw);
        sources.push(raw.structuredContent);
        sources.push(raw.result);
        sources.push(raw.result && raw.result.structuredContent);
        sources.push(raw.params);
        sources.push(raw.params && raw.params.structuredContent);
        sources.push(raw.params && raw.params.result);
        sources.push(raw.params && raw.params.result && raw.params.result.structuredContent);
      }

      if (window.openai && window.openai.toolOutput) {
        const output = window.openai.toolOutput;
        sources.push(output);
        sources.push(output && output.structuredContent);
        sources.push(output && output.result);
        sources.push(output && output.result && output.result.structuredContent);
      }

      for (const candidate of sources) {
        if (isStructuredMapPayload(candidate)) return candidate;
      }
      return null;
    }

    function clearHydrationTimers() {
      if (STATE.hydrationTimeoutId) {
        clearTimeout(STATE.hydrationTimeoutId);
        STATE.hydrationTimeoutId = null;
      }
      if (STATE.hydrationPollId) {
        clearInterval(STATE.hydrationPollId);
        STATE.hydrationPollId = null;
      }
    }

    function hydrate(raw) {
      if (STATE.hydrated) return true;
      const payload = normalizeToolPayload(raw);
      if (!payload) return false;

      STATE.hydrated = true;
      clearHydrationTimers();
      applyPayload(payload);
      return true;
    }

    function showLoadError() {
      if (STATE.hydrated) return;
      document.getElementById('root').innerHTML =
        '<div class="empty-state">Unable to load map results.<br><button class="retry-btn" type="button" onclick="retryHydration()">Retry</button></div>';
    }

    function probeHydrationSources() {
      if (hydrate(window.openai && window.openai.toolOutput)) return true;

      if (window.openai && typeof window.openai.getToolResult === 'function') {
        Promise.resolve(window.openai.getToolResult())
          .then((data) => hydrate(data))
          .catch(() => { });
      }
      return STATE.hydrated;
    }

    function startHydrationChecks() {
      clearHydrationTimers();
      probeHydrationSources();

      let polls = 0;
      STATE.hydrationPollId = setInterval(() => {
        polls += 1;
        if (probeHydrationSources() || polls >= HYDRATION_MAX_POLLS) {
          clearInterval(STATE.hydrationPollId);
          STATE.hydrationPollId = null;
        }
      }, HYDRATION_POLL_MS);

      STATE.hydrationTimeoutId = setTimeout(showLoadError, HYDRATION_TIMEOUT_MS);
    }

    function retryHydration() {
      if (STATE.hydrated) return;
      document.getElementById('root').innerHTML = '<div id="loading">Retrying...</div>';
      startHydrationChecks();
    }

    function sendHeight(overrideHeight) {
      const height = Number.isFinite(Number(overrideHeight)) && Number(overrideHeight) > 0
        ? Number(overrideHeight)
        : Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);

      window.parent.postMessage({ type: 'widget:resize', height }, '*');
    }

    function getFullscreenViewportHeight() {
      if (STATE.fullscreenSource === 'constrained') {
        return Math.max(window.innerHeight, window.screen?.height || 0);
      }
      return window.innerHeight;
    }

    window.retryHydration = retryHydration;

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;

      const displayMode = extractDisplayModeFromMessage(msg);
      if (displayMode) {
        handleHostDisplayModeUpdate(displayMode);
      }

      if (msg.type === 'widget:overlay-state') {
        handleOverlayStateMessage(msg);
        return;
      }

      if (msg.jsonrpc === '2.0' && msg.method === 'ui/notifications/tool-result') {
        hydrate(msg);
        return;
      }

      hydrate(msg);
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        if (STATE.fullscreenOverlay && STATE.detailPropertyId) {
          closeDetailPanel();
          return;
        }
        if (STATE.fullscreenOverlay) {
          closeFullscreen();
        }
      }
    });

    function handleBrowserFullscreenChange() {
      const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;
      if (fullscreenElement) return;
      if (!STATE.fullscreenApiActive) return;

      STATE.fullscreenApiActive = false;
      if (STATE.mode === 'fullscreen') {
        closeFullscreen();
      }
    }

    window.addEventListener('fullscreenchange', handleBrowserFullscreenChange);
    window.addEventListener('webkitfullscreenchange', handleBrowserFullscreenChange);

    const resizeObserver = new ResizeObserver(() => {
      maybeCloseEmbeddedFullscreenFromViewport();
      if (STATE.mode === 'fullscreen') {
        applyFullscreenSidebarView();
      }
      sendHeight(STATE.mode === 'fullscreen' ? getFullscreenViewportHeight() : undefined);
    });
    resizeObserver.observe(document.body);

    window.addEventListener('load', () => sendHeight());
    window.addEventListener('resize', () => {
      maybeCloseEmbeddedFullscreenFromViewport();
      if (STATE.mode === 'fullscreen') {
        const fullscreenCards = STATE.fullscreenOverlay
          ? STATE.fullscreenOverlay.querySelector('#fullscreenCards')
          : null;
        bindFullscreenCardSwipeHandling(fullscreenCards);
        if (isMobileViewport() && STATE.fullscreenSidebarView === 'search') {
          STATE.fullscreenSidebarView = 'cards';
        }
        applyFullscreenSidebarView();
        sendHeight(getFullscreenViewportHeight());
        triggerMapResize();
        return;
      }
      sendHeight();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;
      maybeCloseEmbeddedFullscreenFromViewport();
    });
    window.addEventListener('focus', () => {
      maybeCloseEmbeddedFullscreenFromViewport();
    });

    startHydrationChecks();
  </script>
</body>

</html>
