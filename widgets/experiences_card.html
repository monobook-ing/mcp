<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nearby Places</title>
  <style>
    :root {
      --text: #0b1220;
      --white: #ffffff;
      --muted: #667085;
      --surface: #f7f8fb;
      --card-radius: 22px;
      --section-gap: 18px;
      --grid-gap: 12px;
      --shadow-soft: 0 14px 34px rgba(0, 0, 0, 0.14);
      --shadow-strong: 0 24px 60px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: transparent;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
    }

    #root {
      width: 100%;
      display: grid;
      gap: var(--section-gap);
    }

    .section {
      display: grid;
      gap: 10px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.2px;
      color: #111827;
      padding: 0 2px;
    }

    .experiences-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--grid-gap);
    }

    .exp-card {
      position: relative;
      border-radius: var(--card-radius);
      overflow: hidden;
      aspect-ratio: 3 / 4;
      background: linear-gradient(140deg, #1a2437 0%, #2d4570 48%, #d7a96a 100%);
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      isolation: isolate;
    }

    .exp-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-strong);
    }

    .exp-card__img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      z-index: 0;
    }

    .exp-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.1) 0%,
          rgba(0, 0, 0, 0.2) 48%,
          rgba(0, 0, 0, 0.62) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .exp-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--card-radius);
      border: 1px solid rgba(255, 255, 255, 0.11);
      z-index: 3;
      pointer-events: none;
    }

    .exp-card__content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px 14px 0 14px;
      z-index: 2;
    }

    .exp-card__top {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .exp-card__title {
      font-size: clamp(18px, 3.8vw, 28px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.4px;
      color: var(--white);
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      width: fit-content;
      padding: 4px 9px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #f8fafc;
      background: rgba(17, 24, 39, 0.35);
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
    }

    .badge.rating {
      background: rgba(255, 255, 255, 0.88);
      color: #0f172a;
      border-color: rgba(255, 255, 255, 0.88);
      text-shadow: none;
    }

    .badge.curated {
      background: rgba(240, 253, 250, 0.9);
      color: #115e59;
      border-color: rgba(15, 118, 110, 0.3);
      text-shadow: none;
    }

    .exp-card__bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 12px;
      border-radius: 0 0 var(--card-radius) var(--card-radius);
    }

    .exp-card__tag {
      max-width: 56%;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #4b5563;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .exp-card__cta {
      font-size: 12px;
      font-weight: 900;
      color: #111827;
      text-decoration: none;
      white-space: nowrap;
      border: 1px solid rgba(17, 24, 39, 0.14);
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      transition: opacity 0.15s ease;
    }

    .exp-card__cta:hover {
      opacity: 0.72;
    }

    #loading {
      padding: 14px;
      border-radius: 12px;
      border: 1px dashed #d0d5dd;
      color: #667085;
      background: #ffffff;
      font-size: 13px;
    }

    .empty {
      background: var(--surface);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .retry-btn {
      margin-top: 10px;
      border: 1px solid #d0d5dd;
      background: #ffffff;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      color: #111827;
    }

    @media (max-width: 600px) {
      .experiences-grid {
        gap: 10px;
      }

      .section-title {
        font-size: 14px;
      }

      .exp-card__content {
        padding: 12px 10px 0 10px;
      }

      .exp-card__title {
        font-size: clamp(16px, 4.8vw, 22px);
      }

      .badge {
        font-size: 10px;
        padding: 3px 8px;
      }

      .exp-card__bottom {
        padding: 8px 9px;
      }

      .exp-card__tag {
        font-size: 9px;
      }

      .exp-card__cta {
        font-size: 11px;
        padding: 5px 9px;
      }
    }
  </style>
</head>

<body>
  <main id="root">
    <div id="loading">Loading nearby places...</div>
  </main>

  <script>
    const root = document.getElementById("root");
    let hydrated = false;
    let hydrationTimeoutId = null;
    let hydrationPollId = null;

    const HYDRATION_TIMEOUT_MS = 5000;
    const HYDRATION_POLL_MS = 250;
    const HYDRATION_MAX_POLLS = 20;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function isStructuredPlacesPayload(data) {
      return !!data
        && typeof data === "object"
        && Array.isArray(data.curated)
        && Array.isArray(data.nearby);
    }

    function normalizeToolPayload(raw) {
      const sources = [];

      if (raw && typeof raw === "object") {
        sources.push(raw);
        sources.push(raw.structuredContent);
        sources.push(raw.result);
        sources.push(raw.result?.structuredContent);
        sources.push(raw.params);
        sources.push(raw.params?.structuredContent);
        sources.push(raw.params?.result);
        sources.push(raw.params?.result?.structuredContent);
      }

      if (window.openai && window.openai.toolOutput) {
        const output = window.openai.toolOutput;
        sources.push(output);
        sources.push(output?.structuredContent);
        sources.push(output?.result);
        sources.push(output?.result?.structuredContent);
      }

      for (const candidate of sources) {
        if (isStructuredPlacesPayload(candidate)) return candidate;
      }
      return null;
    }

    function formatRating(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return "";
      return `${num.toFixed(1)} ★`;
    }

    function formatWalking(place) {
      const minutes = Number(place?.walking_minutes);
      if (Number.isFinite(minutes) && minutes > 0) {
        return `${Math.max(1, Math.round(minutes))} min`;
      }
      const meters = Number(place?.distance_m);
      if (Number.isFinite(meters) && meters > 0) {
        return `${Math.max(1, Math.round(meters / 80))} min`;
      }
      return "";
    }

    function firstCuisine(place) {
      if (!Array.isArray(place?.cuisine) || !place.cuisine.length) return "Restaurant";
      return String(place.cuisine[0]);
    }

    function normalizeMapsUrl(place) {
      const url = String(place?.maps_url || "").trim();
      return url || "#";
    }

    function buildCard(place) {
      const title = escapeHtml(place?.name || "Unknown place");
      const ratingText = formatRating(place?.rating);
      const walkingText = formatWalking(place);
      const tag = escapeHtml(firstCuisine(place));
      const mapsUrl = escapeHtml(normalizeMapsUrl(place));
      const imageUrl = String(place?.photo_url || "").trim();
      const isCurated = Boolean(place?.is_curated);

      const badges = [];
      if (ratingText) badges.push(`<span class="badge rating">${escapeHtml(ratingText)}</span>`);
      if (walkingText) badges.push(`<span class="badge">${escapeHtml(walkingText)} walk</span>`);
      if (isCurated) badges.push(`<span class="badge curated">Curated</span>`);

      const imageMarkup = imageUrl
        ? `<img class="exp-card__img" src="${escapeHtml(imageUrl)}" alt="${title}" loading="lazy" />`
        : "";

      return `
        <article class="exp-card">
          ${imageMarkup}
          <div class="exp-card__content">
            <div class="exp-card__top">
              <h3 class="exp-card__title">${title}</h3>
              <div class="badges">${badges.join("")}</div>
            </div>
            <div class="exp-card__bottom">
              <span class="exp-card__tag">${tag}</span>
              <a class="exp-card__cta" href="${mapsUrl}" target="_blank" rel="noopener noreferrer">Directions</a>
            </div>
          </div>
        </article>
      `;
    }

    function renderSection(title, places) {
      if (!Array.isArray(places) || !places.length) return "";
      return `
        <section class="section">
          <h2 class="section-title">${escapeHtml(title)}</h2>
          <div class="experiences-grid">
            ${places.map(buildCard).join("")}
          </div>
        </section>
      `;
    }

    function render(payload) {
      const curated = Array.isArray(payload.curated) ? payload.curated : [];
      const nearby = Array.isArray(payload.nearby) ? payload.nearby : [];

      if (!curated.length && !nearby.length) {
        root.innerHTML = `<div class="empty">No nearby places found for this property.</div>`;
        return;
      }

      root.innerHTML = `
        ${renderSection("Recommended by us", curated)}
        ${renderSection("More nearby", nearby)}
      `;
      setTimeout(sendHeight, 50);
    }

    function clearHydrationTimers() {
      if (hydrationTimeoutId) {
        clearTimeout(hydrationTimeoutId);
        hydrationTimeoutId = null;
      }
      if (hydrationPollId) {
        clearInterval(hydrationPollId);
        hydrationPollId = null;
      }
    }

    function hydrate(raw) {
      if (hydrated) return true;
      const payload = normalizeToolPayload(raw);
      if (!payload) return false;
      hydrated = true;
      clearHydrationTimers();
      render(payload);
      return true;
    }

    function showLoadError() {
      if (hydrated) return;
      root.innerHTML = '<div id="loading">Unable to load places. Please retry.<br><button class="retry-btn" type="button" onclick="retryHydration()">Retry</button></div>';
    }

    function probeHydrationSources() {
      if (hydrated) return true;
      if (window.openai && hydrate(window.openai.toolOutput)) return true;
      if (window.openai && typeof window.openai.getToolResult === "function") {
        Promise.resolve(window.openai.getToolResult())
          .then(hydrate)
          .catch(() => { });
      }
      return hydrated;
    }

    function startHydrationChecks() {
      clearHydrationTimers();
      probeHydrationSources();

      let polls = 0;
      hydrationPollId = setInterval(() => {
        polls += 1;
        if (probeHydrationSources() || polls >= HYDRATION_MAX_POLLS) {
          clearInterval(hydrationPollId);
          hydrationPollId = null;
        }
      }, HYDRATION_POLL_MS);

      hydrationTimeoutId = setTimeout(showLoadError, HYDRATION_TIMEOUT_MS);
    }

    function retryHydration() {
      if (hydrated) return;
      root.innerHTML = '<div id="loading">Retrying...</div>';
      startHydrationChecks();
    }

    function sendHeight() {
      const height = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: "widget:resize", height: height }, "*");
    }

    window.retryHydration = retryHydration;

    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.type === "hydrate" && msg.data) {
        hydrate(msg.data);
        return;
      }
      if (msg.jsonrpc === "2.0" && msg.method === "ui/notifications/tool-result") {
        hydrate(msg);
      }
    });

    const resizeObserver = new ResizeObserver(() => {
      sendHeight();
    });
    resizeObserver.observe(document.body);

    window.addEventListener("load", sendHeight);
    window.addEventListener("resize", sendHeight);

    startHydrationChecks();
  </script>
</body>

</html>
